<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#00c8ff" />

  <title>Thank you — Patrie Network</title>
  <meta name="description" content="Thanks—you're on the list." />
  <meta name="robots" content="noindex, follow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #0d1117;
      --border:    #1c2333;
      --accent:    #00c8ff;
      --accent2:   #7b61ff;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --font:      'Space Grotesk', sans-serif;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      color: var(--text);
      background: var(--bg);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0,200,255,.15) 0%, transparent 70%),
                  radial-gradient(ellipse 60% 40% at 80% 100%, rgba(123,97,255,.12) 0%, transparent 60%);
      animation: bgPulse 8s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes bgPulse {
      from { opacity: .7; }
      to   { opacity: 1; }
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem 4rem;
      text-align: center;
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: rgba(13,17,23,.6);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem 1.5rem;
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: clamp(2rem, 5vw, 2.6rem);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -.02em;
      background: linear-gradient(135deg, #ffffff 0%, var(--accent) 55%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 22px rgba(0,200,255,.28));
    }

    p {
      margin-top: .9rem;
      color: var(--muted);
      line-height: 1.7;
      font-size: .95rem;
    }

    .actions {
      margin-top: 1.5rem;
      display: flex;
      justify-content: center;
      gap: .75rem;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: .75rem 1.2rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      letter-spacing: .02em;
      transition: border-color .25s, background .25s, transform .15s;
    }

    .btn.primary {
      border: none;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: #fff;
    }

    .btn:hover { transform: translateY(-1px); border-color: var(--accent); }
    .btn.primary:hover { opacity: .95; }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <main class="page" aria-labelledby="thanks-title">
    <section class="card">
      <h1 id="thanks-title">Thanks—you're on the list.</h1>
      <p>We’ll email you when Patrie Network launches.</p>
      <div class="actions">
        <a class="btn primary" href="/">Back to home</a>
        <a class="btn" href="https://patrienetwork.com">Visit patrienetwork.com</a>
      </div>
      <p class="sr-only">You can close this tab if you’d like.</p>
    </section>
  </main>
</body>
</html>
